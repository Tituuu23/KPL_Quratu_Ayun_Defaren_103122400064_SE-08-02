<body>

<div class="container">

<h1>Pengkonversi Gaya Teks</h1>

<p>Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan menghitung huruf.</p>

<label>Masukkan teks:</label><br>

<textarea id="teks" placeholder="Kata-kata..."></textarea>

<p>
Huruf: <span class="merah" id="jumlahHuruf">0</span>,
huruf besar: <span class="merah" id="hurufBesar">0</span>,
huruf kecil: <span class="merah" id="hurufKecil">0</span>
</p>

<button onclick="besar()">Besarkan</button>
<button onclick="kecil()">Kecilkan</button>


</div>
<p> </p>
<div class="grup-tg">

  <button id="tombol-terang">Mode Terang</button>
  <button id="tombol-gelap">Mode Gelap</button>

    
</div>

<script src="index.js"></script>
